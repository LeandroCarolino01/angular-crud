<div class="panel panel-primary" *ngFor="let employee of employees">
  <div class="panel-heading">
    <h3 class="panel-title">{{employee.name}}</h3>
  </div>
  <div class="panel-body">
    <div class="col-xs-10">
      <div class="row">
        <div class="col-xs-4">
          <img class="imageClass" [src]="employee.photoPath" alt="">
        </div>
        <div class="col-xs-8">
          <div class="row">
            <div class="col-xs-6">
              Name
            </div>
            <div class="col-xs-6">
              {{ employee.name}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              gender
            </div>
            <div class="col-xs-6">
              {{ employee.gender}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              Date of birth
            </div>
            <div class="col-xs-6">
              {{ employee.dateOfBirth | date}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              Contact preference
            </div>
            <div class="col-xs-6">
              {{ employee.contactPreference}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              phone
            </div>
            <div class="col-xs-6">
              {{ employee.phoneNumber}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              Email
            </div>
            <div class="col-xs-6">
              {{ employee.email}}
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              Department
            </div>
            <div class="col-xs-6" [ngSwitch]="employee.department">
              :
              <span *ngSwitchCase="1">Help Desk</span>
              <span *ngSwitchCase="2">HR</span>
              <span *ngSwitchCase="3">IT</span>
              <span *ngSwitchCase="4">N/A</span>
              <span *ngSwitchDefault>N/A</span>
            </div>
          </div>
          <div class="row">
            <div class="col-xs-6">
              Is active
            </div>
            <div class="col-xs-6">
              {{ employee.isActive}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
