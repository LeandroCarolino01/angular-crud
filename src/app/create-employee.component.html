
<form #employeeForm="ngForm" (ngSubmit)="saveEmployee(employeeForm)">
  <div class="panel panel-primary">
    <div class="panel-heading">
      <h3 class="panel-title">Create Employee</h3>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="fullName" [(ngModel)]="fullName" name="fullName" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email"  [(ngModel)]="email" name="email" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input id="phoneNumber"  [(ngModel)]="phoneNumber" name="phoneNumber" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label>Contact Preference</label>
        <div class="form-control">
          <label class="radio-inline">
            <input type="radio" name="contactPreference" value="">
            Email
          </label>
          <label class="radio-inline">
            <input type="radio" name="contactPreference">
            Phone
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <div class="form-control">
          <label class="radio-inline">
            <input type="radio" value="male" name="gender" [(ngModel)]="gender">
            Male
          </label>
          <label class="radio-inline">
            <input type="radio" value="female" name="gender" [(ngModel)]="gender">
            Female
          </label>
        </div>
      </div>

      <div class="form-group">

        <div class="form-control">
          <label class="checkbox-inline">
            <input type="checkbox" value="isActive" name="gender" [(ngModel)]="isActive">
            Is Active
          </label>
        </div>
      </div>

      <div class="form-group">
          <label for="department">
            Department
          </label>
          <select id="department" name="department" [(ngModel)]="department" class="form-control">
           <option *ngFor="let dept of departments" [value]="dept.id">
             {{dept.name}}
           </option>
          </select>
      </div>
    </div>
    <div class="panel-footer">
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </div>
</form>

{{ employeeForm.value | json }}
